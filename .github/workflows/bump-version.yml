name: Bump patch version

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump patch version in marketplace.json
        run: |
          file=".claude-plugin/marketplace.json"
          current=$(jq -r '.metadata.version' "$file")
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"
          jq --arg v "$new_version" '.metadata.version = $v' "$file" > tmp.json && mv tmp.json "$file"
          echo "Bumped version: $current -> $new_version"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump plugin version to $(jq -r '.metadata.version' .claude-plugin/marketplace.json)"
          git push
