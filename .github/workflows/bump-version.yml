name: Bump patch version

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Check if version already bumped
        id: check
        run: |
          file=".claude-plugin/marketplace.json"
          git fetch origin main
          base_version=$(git show origin/main:"$file" | jq -r '.metadata.version')
          head_version=$(jq -r '.metadata.version' "$file")
          if [ "$base_version" != "$head_version" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version already bumped: $base_version -> $head_version"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version needs bump: $base_version"
          fi

      - name: Bump patch version in marketplace.json
        if: steps.check.outputs.skip == 'false'
        run: |
          file=".claude-plugin/marketplace.json"
          current=$(jq -r '.metadata.version' "$file")
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"
          jq --arg v "$new_version" '.metadata.version = $v' "$file" > tmp.json && mv tmp.json "$file"
          echo "Bumped version: $current -> $new_version"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump plugin version to $(jq -r '.metadata.version' .claude-plugin/marketplace.json)"
          git push

      - name: Set success status on HEAD
        run: |
          sha=$(git rev-parse HEAD)
          gh api "repos/${{ github.repository }}/statuses/${sha}" \
            -f state=success \
            -f context="Bump patch version" \
            -f description="Version bump completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
